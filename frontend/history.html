<!DOCTYPE html>
<html>
<head>
    <title>Fitness AI - History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <span class="navbar-brand">
            📊 Fitness AI History
        </span>

        <a href="dashboard.html" class="btn btn-success">
            Dashboard
        </a>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h3>Your Health Records</h3>

            <table class="table table-striped">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Height</th>
                        <th>Weight</th>
                        <th>BMI</th>
                        <th>Category</th>
                        <th>Calories</th>
                    </tr>

                </thead>

                <tbody id="historyTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

async function loadHistory(){

    const token = localStorage.getItem("token");

const res = await fetch("https://fitgpt-n655.onrender.com/history", {
    method: "GET",
    headers: {
        "Authorization": "Bearer " + token
    }
});

const data = await res.json();
console.log(data);

    let rows = "";

    data.forEach(item => {

        rows += `
        <tr>
            <td>${item.id}</td>
            <td>${item.age}</td>
            <td>${item.gender}</td>
            <td>${item.height}</td>
            <td>${item.weight}</td>
            <td>${item.bmi.toFixed(2)}</td>
            <td>${item.category}</td>
            <td>${item.calories.toFixed(2)}</td>
        </tr>
        `;
    });

    document.getElementById(
        "historyTable"
    ).innerHTML = rows;
}

loadHistory();

</script>

</body>
</html>
