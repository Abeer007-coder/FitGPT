<!DOCTYPE html>
<html>
<head>

<title>FitGPT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">
🏋️ FitGPT
</span>

<button
class="btn btn-danger"
onclick="logout()">
Logout
</button>

</div>

</nav>

<div class="container py-5">

<div class="dashboard-card">

<h3 class="text-center mb-4">
    Health Analysis
</h3>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-4 col-sm-10">
<label class="form-label">Age</label>
<input
id="age"
class="form-control"
placeholder="Age">
</div>



<div class="col-md-4">
<label class="form-label">Height</label>
<input
id="height"
class="form-control"
placeholder="Height (cm)">
</div>


<div class="col-md-4">
<label class="form-label">Weight</label>
<input
id="weight"
class="form-control"
placeholder="Weight (kg)">
</div>


<div class="col-md-4">
<label class="form-label">Gender</label>
<select id="gender" class="form-select mb-3">
    <option value="male">Male</option>
    <option value="female">Female</option>
</select>

<label class="form-label">Activity Level</label>
<select id="activity" class="form-select mb-3">
    <option value="low">Low</option>
    <option value="moderate">Moderate</option>
    <option value="high">High</option>
</select>

<label class="form-label">Goal</label>
<select id="goal" class="form-select mb-4">
    <option value="lose">Lose Weight</option>
    <option value="maintain">Maintain Weight</option>
    <option value="gain">Gain Weight</option>
</select>

<!-- AI Diet Planner -->
<div class="card shadow-lg border-0 mt-4">
    <div class="card-header bg-success text-white">
        <h4 class="mb-0">🥗 AI Diet Planner</h4>
    </div>

    <div class="card-body">

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Food Preference</label>
                <select id="foodType" class="form-select">
                    <option value="veg">Vegetarian</option>
                    <option value="nonveg">Non-Vegetarian</option>
                </select>
            </div>

            <div class="col-md-6 d-flex align-items-end">
                <button class="btn btn-success w-100"
                        onclick="generateDiet()">
                    🍽️ Generate Diet Plan
                </button>
            </div>

        </div>

    </div>
</div>

<!-- Diet Plan Result -->
<div id="dietResult" class="mt-4"></div>


<br>

<button
class="btn btn-primary"
onclick="analyze()">
Analyze
</button>

<a
href="history.html"
class="btn btn-success">
History
</a>

</div>

<div id="result" class="result-card"></div>

</div>
<div class="card mt-4 shadow">
    <div class="card-body">
        <h3>🤖 FitGPT Coach</h3>

        <textarea
            id="message"
            class="form-control"
            rows="3"
            placeholder="Ask fitness questions..."
        ></textarea>

        <button
            class="btn btn-primary mt-3"
            onclick="askAI()"
        >
            Ask AI
        </button>

        <div id="chatResult" class="mt-3"></div>
    </div>
</div>

<script>

function logout(){

    localStorage.removeItem("token");

    window.location.href="login.html";
}

async function analyze(){

    const token =
    localStorage.getItem("token");
    if (!token) {
    window.location.href = "login.html";
}

    const res = await fetch(
        "https://fitgpt-n655.onrender.com/analyze",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },

            body:JSON.stringify({

                age:Number(
                    document.getElementById("age").value
                ),

                gender:
                document.getElementById("gender").value,

                height:Number(
                    document.getElementById("height").value
                ),

                weight:Number(
                    document.getElementById("weight").value
                ),

                activity_level:
                document.getElementById("activity").value,

                goal:
                document.getElementById("goal").value
            })
        }
    );

    const data = await res.json();

    document.getElementById("result").innerHTML=`

    <div class="row">

        <div class="col-md-3">
            <div class="card shadow text-center p-3">
                <h5>BMI</h5>
                <h2>${data.bmi}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center p-3">
                <h5>BMR</h5>
                <h2>${data.bmr}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center p-3">
                <h5>Category</h5>
                <h2>${data.category}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center p-3">
                <h5>Calories</h5>
                <h2>${data.target_calories}</h2>
            </div>
        </div>

    </div>

    <div class="card shadow p-4 mt-4">

        <h4>AI Recommendation</h4>

        <p>${data.advice}</p>

    </div>

    `;
}

</script>
<script>
async function askAI() {

    const msg = document.getElementById("message").value;

    document.getElementById("chatResult").innerHTML = `
        <div class="text-center p-3">
            <div class="spinner-border text-primary"></div>
            <p>Fitness AI is thinking...</p>
        </div>
    `;

    const res = await fetch("https://fitgpt-n655.onrender.com/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: msg
        })
    });

    const data = await res.json();

    document.getElementById("chatResult").innerHTML = `
        <div class="card shadow border-0 mt-3">
            <div class="card-header bg-success text-white">
                🤖 Fitness AI Coach
            </div>
            <div class="card-body">
                ${marked.parse(data.reply)}
            </div>
        </div>
    `;
}
</script>
<script>
async function generateDiet() {

    const foodType =
        document.getElementById("foodType").value;

    document.getElementById("dietResult").innerHTML = `
        <div class="card shadow">
            <div class="card-body text-center">
                <div class="spinner-border text-success"></div>
                <p class="mt-2">Generating Diet Plan...</p>
            </div>
        </div>
    `;

    const res = await fetch("https://fitgpt-n655.onrender.com/diet", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            food_type: foodType
        })
    });

    const data = await res.json();

console.log("DIET RESPONSE:", data);

document.getElementById("dietResult").innerHTML = `
<div class="card shadow-lg border-0">
    <div class="card-header bg-warning">
        <h4 class="mb-0">🍽️ Your Diet Plan</h4>
    </div>
    <div class="card-body">
        ${marked.parse(data.plan || data.reply || data.diet_plan || "No plan returned")}
    </div>
</div>
`;
}
</script>

</body>
</html>
